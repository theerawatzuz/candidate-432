apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-nginx-config
data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 80;
        
        location / {
          # Strip /hello prefix
          rewrite ^/hello/(.*)$ /$1 break;
          rewrite ^/hello$ / break;
          
          proxy_pass http://kpc-candidate-test.s3-website-ap-southeast-1.amazonaws.com;
          proxy_set_header Host kpc-candidate-test.s3-website-ap-southeast-1.amazonaws.com;
          proxy_set_header Accept-Encoding "";
          
          # Decompress before sub_filter
          gunzip on;
          
          # Fix relative paths to absolute with /hello prefix
          sub_filter 'href="../' 'href="/hello/';
          sub_filter 'src="../' 'src="/hello/';
          sub_filter 'href="/' 'href="/hello/';
          sub_filter 'src="/' 'src="/hello/';
          sub_filter_once off;
          sub_filter_types text/html;
        }
      }
    }
