apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-nginx-config
data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 80;
        
        location / {
          rewrite ^/hello(/.*)$ $1 break;
          proxy_pass http://kpc-candidate-test.s3-website-ap-southeast-1.amazonaws.com;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }
