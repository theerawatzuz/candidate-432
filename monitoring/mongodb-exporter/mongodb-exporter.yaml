apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-exporter
  template:
    metadata:
      labels:
        app: mongodb-exporter
    spec:
      containers:
        - name: mongodb-exporter
          image: percona/mongodb_exporter:0.20
          ports:
            - containerPort: 9216
          env:
            - name: MONGODB_URI
              value: "mongodb://mongo.default.svc.cluster.local:27017/?replicaSet=rs0"
