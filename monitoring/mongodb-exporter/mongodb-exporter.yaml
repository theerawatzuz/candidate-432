apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-exporter
  template:
    metadata:
      labels:
        app: mongodb-exporter
    spec:
      containers:
        - name: mongodb-exporter
          image: percona/mongodb_exporter:0.47.0
          ports:
            - containerPort: 9216
          args:
            - --mongodb.uri=$(MONGODB_URI)
            - --collector.diagnosticdata
            - --collector.replicasetstatus
            - --collector.dbstats
          env:
            - name: MONGODB_URI
              value: "mongodb://mongo-0.mongo.default.svc.cluster.local:27017,mongo-1.mongo.default.svc.cluster.local:27017,mongo-2.mongo.default.svc.cluster.local:27017/?replicaSet=rs0"
